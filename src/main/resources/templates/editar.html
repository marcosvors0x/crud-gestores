<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Gestor</title>
</head>
<body>

<h2>Editar Gestor</h2>

<form action="/gestores/atualizar/1" method="post">  

    Nome: <input type="text" name="nome" th:value="${gestor.nome}" /><br><br>
    Email: <input type="text" name="email" th:value="${gestor.email}" /><br><br>

    <button type="submit">Atualizar</button>
</form>

</body>
</html>
